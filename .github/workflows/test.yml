name: Cross-Platform Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package:
    name: Package ${{ matrix.name }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            name: linux
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            name: linux
            arch: aarch64
            target: aarch64-unknown-linux-gnu
          - runner: windows-latest
            name: windows
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            name: windows
            arch: aarch64
            target: aarch64-pc-windows-msvc
          - runner: macos-15-intel
            name: macos
            arch: x86_64
            target: x86_64-apple-darwin
          - runner: macos-latest
            name: macos
            arch: aarch64
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          target: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: package-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Check Code Format & Clippy
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y curl dpkg rpm
          sudo apt-get install -y libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev libssl-dev zlib1g-dev

      - uses: taiki-e/install-action@nextest
      - name: Test
        run: cargo nextest run --no-fail-fast --all-features
